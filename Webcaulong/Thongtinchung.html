<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin Court Sport</title>
    <link rel="stylesheet" href="Nguoidung.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      .info-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .demo-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
        margin-top: 20px;
      }
      .court-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        overflow: hidden;
        transition:
          transform 0.3s ease,
          border-color 0.3s ease;
      }
      .court-card:hover {
        transform: translateY(-5px);
        border-color: var(--neon-volt);
      }
      .court-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-bottom: 1px solid var(--glass-border);
      }
      .court-body {
        padding: 20px;
      }
      .court-title {
        color: var(--text-main);
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .court-desc {
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1.5;
        margin-bottom: 15px;
        height: 45px;
        overflow: hidden;
      }
      .static-page-content {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 30px;
        line-height: 1.8;
      }
      .partner-logo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 20px;
        margin-top: 30px;
        text-align: center;
      }
      .partner-item {
        background: rgba(255, 255, 255, 0.02);
        border: 1px dashed var(--glass-border);
        padding: 20px;
        border-radius: 8px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: var(--bg-darker);
        border-bottom: 1px solid var(--glass-border);
        padding: 15px 20px;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
      "
    >
      <div style="display: flex; align-items: center; gap: 10px">
        <span
          style="color: var(--neon-volt); font-weight: bold; font-size: 1.3rem"
          >COURT SPORT</span
        >
      </div>
      <nav style="display: flex; gap: 15px">
        <a href="Nguoidung.html" class="btn-text"
          ><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a
        >
        <a
          href="Datsan.html"
          class="btn-neon"
          style="padding: 5px 15px; font-size: 14px"
          >ĐẶT SÂN NGAY</a
        >
      </nav>
    </header>

    <section class="info-wrapper" style="padding-top: 100px; min-height: 80vh">
      <h2
        id="page-title"
        style="color: var(--neon-volt); margin-bottom: 25px; font-size: 2rem"
      >
        Đang tải dữ liệu...
      </h2>

      <div id="dynamic-content"></div>
    </section>

    <footer
      style="
        margin-top: 50px;
        border-top: 1px solid var(--glass-border);
        padding: 20px 0;
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
      "
    >
      <p>&copy;2026 Court Sport. Sản phẩm của nhóm 4AN1PM.</p>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const section = urlParams.get("section");
        const mon = urlParams.get("mon");

        const pageTitleElement = document.getElementById("page-title");
        const contentContainer = document.getElementById("dynamic-content");

        const dsSanBongDa = [
          {
            name: "Sân Bóng Đá Tiểu Học Quốc Tế - Sân A",
            img: "https://hanoisports.com/wp-content/uploads/2023/07/Hinh-anh-san-bong-da-mini.webp",
            desc: "Mặt cỏ nhân tạo chuẩn FIFA, hệ thống đèn chiếu sáng ban đêm không chói mắt.",
          },
          {
            name: "Sân Bóng Đá KĐT Sala - Sân 11 Người",
            img: "https://images.unsplash.com/photo-1529900748604-07564a03e7a6?q=80&w=600",
            desc: "Không gian rộng rãi thoáng đãng, có khán đài mái che và khu vực căng tin cao cấp.",
          },
          {
            name: "Sân Bóng Đá Mini Sport Center",
            img: "https://images.unsplash.com/photo-1575361204480-aadea25e6e68?q=80&w=600",
            desc: "Thích hợp cho các trận đấu giao hữu phủi 5 vs 5 và 7 vs 7, giá thuê cực sinh viên.",
          },
        ];

        const dsSanCauLong = [
          {
            name: "Sân Cầu Lông Standard Club - Thảm 1",
            img: "https://tse1.mm.bing.net/th/id/OIP.se2PzMoPohBiUvTKFHgC2gHaEK?cb=thfc1falcon3&rs=1&pid=ImgDetMain&o=7&rm=3",
            desc: "Thảm cao su chống trơn trượt tuyệt đối, trần cao 9m đạt chuẩn thi đấu cầu lông quốc gia.",
          },
          {
            name: "Sân Cầu Lông Nhà Thi Đấu Quận 5",
            img: "https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=600",
            desc: "Hệ thống gió được kiểm soát chuyên nghiệp không làm lệch đường cầu, ánh sáng hai bên hông.",
          },
          {
            name: "Sân Cầu Lông Pro Badminton Center",
            img: "https://thf.bing.com/th/id/OIP.Sbadx6nFyE2v9Jq_G4ZArQHaEc?w=320&h=192&c=7&r=0&o=7&cb=thfc1falcon3&dpr=1.6&pid=1.7&rm=3",
            desc: "Hỗ trợ mượn vợt và mua cầu tại quầy. Có phòng tắm locker tiện nghi cho hội viên.",
          },
        ];

        if (section === "doitac") {
          pageTitleElement.innerText = "Đối tác & Chúng tôi";
          contentContainer.innerHTML = `
          <div class="static-page-content">
            <h3 style="color: var(--neon-volt)">Về Hệ Thống Court Sport</h3>
            <p>Court Sport tự hào là hệ thống quản lý và kết nối sân bãi thể thao tiên tiến, đem lại quy trình chuyển đổi số hóa minh bạch và thông minh giúp người chơi thể thao tìm kiếm và giữ chỗ sân đấu chỉ trong 30 giây.</p>
            <p style="margin-top: 15px;">Chúng tôi hợp tác chặt chẽ cùng các đơn vị quản lý thể thao đô thị và các thương hiệu đồ dùng thể thao hàng đầu Việt Nam nhằm nâng cao trải nghiệm tập luyện khỏe mạnh của cộng đồng.</p>
            
            <div class="partner-logo-grid">
              <div class="partner-item" style="color: #00ebff;"><i class="fa-solid fa-shield-halved"></i> Nike Vietnam</div>
              <div class="partner-item" style="color: #ff007c;"><i class="fa-solid fa-bolt"></i> Adidas Group</div>
              <div class="partner-item" style="color: var(--neon-volt);"><i class="fa-solid fa-star"></i> Động Lực Sport</div>
              <div class="partner-item" style="color: #38bdf8;"><i class="fa-solid fa-handshake"></i> VTV Cab Sports</div>
            </div>
          </div>
        `;
        } else if (section === "cuocthi") {
          pageTitleElement.innerText = "Giải Đấu & Cuộc Thi Toàn Quốc";
          contentContainer.innerHTML = `
          <div class="static-page-content">
            <h3 style="color: var(--neon-volt); margin-bottom: 10px;"><i class="fa-solid fa-trophy"></i> Giải Bóng Đá Phủi Toàn QUỐC "Court Sport Cup 2026"</h3>
            <p style="color: var(--text-muted)">Thời gian diễn ra: Từ ngày 30/07/2026 đến 30/08/2026</p>
            <p style="margin-top: 10px;">Cơ hội tranh tài của hơn 30 đội bóng xuất sắc của cả nước. Tổng giá trị giải thưởng lên đến 100.000.000 VNĐ kèm cúp vô địch mạ vàng đính kim cương từ ban tổ chức.</p>
            
            <hr style="border:0; border-top:1px dashed var(--glass-border); margin:25px 0;">
            
            <h3 style="color: var(--neon-volt); margin-bottom: 10px;"><i class="fa-solid fa-medal"></i> Đại Hội Cầu Lông Đơn Nam/Đôi Nam Nữ Mở Rộng</h3>
            <p style="color: var(--text-muted)">Thời gian mở đăng ký: 12/07/2026 đến 12/11/2026</p>
            <p style="margin-top: 10px;">Giải đấu quy tụ các lông thủ từ nghiệp dư đến chuyên nghiệp tranh giải. Hệ thống tính điểm tự động hiển thị trực tiếp trên app và tổng giải thưởng lên đến $10000.</p>
            
            <div style="margin-top: 30px; text-align: center;">
              <a href="Datsan.html" class="btn-neon" style="padding: 12px 35px; display: inline-block;">Đăng Ký Đặt Sân Tập Luyện Ngay</a>
            </div>
          </div>
        `;
        } else if (section === "danhsachsan" && mon === "bongda") {
          pageTitleElement.innerText = "Danh Sách Sân Bóng Đá Sẵn Sàng";
          renderCourtList(dsSanBongDa);
        } else if (section === "danhsachsan" && mon === "caulong") {
          pageTitleElement.innerText = "Danh Sách Sân Cầu Lông Sẵn Sàng";
          renderCourtList(dsSanCauLong);
          // } else {
          //   pageTitleElement.innerText = "Khám Phá Sân Đấu Tại Court Sport";
          //   contentContainer.innerHTML = `
          //   <div class="static-page-content" style="text-align:center;">
          //     <p>Vui lòng lựa chọn các mục chuyên mục trên thanh Menu để tham quan demo chi tiết.</p>
          //     <div style="margin-top: 20px; display:flex; gap:15px; justify-content:center;">
          //       <a href="?section=danhsachsan&mon=bongda" class="btn-neon" style="padding:10px 20px;">Xem Sân Bóng Đá</a>
          //       <a href="?section=danhsachsan&mon=caulong" class="btn-neon" style="padding:10px 20px;">Xem Sân Cầu Lông</a>
          //     </div>
          //   </div>
          // `;
        }

        function renderCourtList(listData) {
          let htmlCards = `<div class="demo-card-grid">`;
          listData.forEach((court) => {
            htmlCards += `
            <div class="court-card">
              <img src="${court.img}" alt="${court.name}" class="court-img">
              <div class="court-body">
                <div class="court-title">${court.name}</div>
                <div class="court-desc">${court.desc}</div>
                <a href="Datsan.html" class="btn-neon" style="display: block; text-align: center; padding: 10px 0; font-size:15px; font-weight:bold;">
                  Đặt sân này <i class="fa-solid fa-angle-right"></i>
                </a>
              </div>
            </div>
          `;
          });
          htmlCards += `</div>`;
          contentContainer.innerHTML = htmlCards;
        }

        if (localStorage.getItem("theme") === "light") {
          document.body.classList.add("light-theme");
        }
      });
    </script>
  </body>
</html>
